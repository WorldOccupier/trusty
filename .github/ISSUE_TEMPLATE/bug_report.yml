name: Bug Report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run '...'
        2. See error
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        OS, Go version, Trusty version
      placeholder: |
        macOS 14.5, Go 1.24.0, Trusty 0.1.0
